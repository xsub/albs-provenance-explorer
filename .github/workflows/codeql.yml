# CodeQL static security analysis (GitHub code scanning) for the workbench branch.
name: CodeQL

on:
  push:
    branches: ["InvestigationWorkbenchApp"]
  pull_request:
    branches: ["InvestigationWorkbenchApp"]
  schedule:
    - cron: "41 3 * * 1"   # weekly, Monday 03:41 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
