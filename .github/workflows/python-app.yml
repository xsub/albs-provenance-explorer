# CI for the PyQt workbench branch: lint (ruff), type-check (mypy --strict),
# and the full offline suite -- including the PyQt5 GUI tests, run headless.
#
# Differences from the backend branches: install the `gui` extra (PyQt5), the
# system libs its offscreen platform plugin needs, and run Qt headless via
# QT_QPA_PLATFORM=offscreen. Tests never hit the network (repo rule).
name: CI

on:
  push:
    branches: ["InvestigationWorkbenchApp"]
  pull_request:
    branches: ["InvestigationWorkbenchApp"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # Headless Qt for the whole job -- set before Python starts so the platform
  # plugin never looks for a display (conftest also sets it, belt-and-suspenders).
  QT_QPA_PLATFORM: offscreen

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libs (Graphviz + Qt offscreen plugin deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            graphviz libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install package + dev + gui extras (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,gui]'

      # Lint and type-check are Python-version-independent; run once, on 3.11.
      - name: Lint (ruff)
        if: matrix.python-version == '3.11'
        run: ruff check albs_graph tests

      - name: Type-check (mypy --strict)
        if: matrix.python-version == '3.11'
        run: mypy albs_graph

      - name: Test (pytest + coverage, headless Qt)
        run: pytest --cov=albs_graph --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: workbench
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Cross-check the documented test count
        if: matrix.python-version == '3.11'
        run: bash scripts/check-test-count.sh
